# RAMDisk Linker Configuration
# Semantics of values:
# - Root level relative paths: logger issues a warning and the path is resolved against the configuration file directory.
# - Null/Empty: if source exists and is not a link:
#   1. create target on RAM
#   2. rename source to source+".LINKED_{datetime}"
#   3. create junction at the source path pointing to the RAM target
# - "?prefix": only process if the source exists (skip unused apps)
# - "<file": inline that file’s lines as keys at the current level (used for reusable lists like Chrome caches)
# - ">": override destination target (if value is a string, link to it; if list, link to the first existing path)
# - ":mkdir": create the empty subdirs
# - ":defs": reusable definitions (can be referenced with *alias, expanded by yaml parser, ignored by the app)
# Non-empty non-links get renamed.
# Files are handled separately: if the source is
# * a file symlink whose target is on the RAM drive and missing, touch the target on RAM
# * an existing file, touch the target (on RAM drive or specified by ">"), then rename source, and create file symlink at the source path pointing to the RAM drive
# * if does not exist, touch the target (on RAM drive or specified by ">"), and create file symlink at the source path pointing to the RAM drive

":exec_pre":
  - ATTRIB +I "%RAMDrive%\*.*" /S /D /L
# ":exec_post":
#   - COMPACT /C "%Log%" /Q
# ":uselinkstarget": true  # keep existing junction/symlink targets instead of repointing them to RAM
":env":
  # Env vars starting with "?" are only set if they are not yet defined or empty
  # Note that the order of items in the env section is not guaranteed,
  # so the program must resolve them recursively
  # but once resolved, the result should be saved to customEnv
  "?APPDATA": "%USERPROFILE%\\AppData\\Roaming"
  "?LOCALAPPDATA": "%USERPROFILE%\\AppData\\Local"
  "?USERPROFILE": "d:\\Users\\LogicDaemon"
":log": "%RAMDrive%\\RAMDiskLinker.log"  # if relative, base is configDir
":uselinkstarget": true  # if true, when updating links, do not change the target path, but only create the destination if it doesn't exist

":mkdir":
